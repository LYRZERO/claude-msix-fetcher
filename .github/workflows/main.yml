name: 获取 Claude Desktop MSIX

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'MSIX 版本号（留空则自动获取最新版）'
        required: false
        default: 'latest'

jobs:
  fetch-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 下载 Claude Desktop MSIX
        shell: pwsh
        run: |
          $url = "https://claude.ai/api/desktop/win32/x64/msix/latest/redirect"
          Write-Host "下载地址: $url"

          # 跟随重定向下载
          $response = Invoke-WebRequest -Uri $url -MaximumRedirection 5 -OutFile "Claude.msix" -PassThru
          Write-Host "下载完成: $($response.StatusCode)"

          $fileSize = (Get-Item "Claude.msix").Length
          Write-Host "文件大小: $($fileSize) bytes"

          if ($fileSize -lt 1000000) {
            Write-Host "警告：文件小于 1MB，可能不是有效的安装包"
            Get-Content "Claude.msix" -First 5
            exit 1
          }

          Write-Host "MSIX 下载成功！"

      - name: 提取版本号
        shell: pwsh
        run: |
          if (-not (Test-Path "Claude.msix")) {
            Write-Error "Claude.msix 未找到"
            exit 1
          }

          $tempDir = Join-Path $env:TEMP ("claude_msix_" + [guid]::NewGuid().ToString())
          New-Item -Path $tempDir -ItemType Directory | Out-Null

          try {
            # 解压 MSIX（MSIX 兼容 ZIP）
            Expand-Archive -Path "Claude.msix" -DestinationPath $tempDir -Force

            # 常见清单路径
            $possibleManifests = @(
              (Join-Path $tempDir "AppxManifest.xml"),
              (Join-Path $tempDir "AppxBundleManifest.xml"),
              (Join-Path $tempDir "AppxMetadata\AppxBundleManifest.xml")
            )

            $manifestPath = $possibleManifests | Where-Object { Test-Path $_ } | Select-Object -First 1

            if (-not $manifestPath) {
              Write-Warning "未在包内找到 AppxManifest.xml 或 AppxBundleManifest.xml，使用 'latest' 作为版本"
              $versionInfo = "latest"
            } else {
              try {
                [xml]$xml = Get-Content $manifestPath -ErrorAction Stop
              } catch {
                Write-Warning "读取清单失败：$($_.Exception.Message). 使用 'latest' 作为版本"
                $versionInfo = "latest"
              }

              if (-not $versionInfo) {
                $versionInfo = $null

                if ($xml.Package -and $xml.Package.Identity) {
                  $versionInfo = $xml.Package.Identity.Version
                } elseif ($xml.Bundle -and $xml.Bundle.Identity) {
                  $versionInfo = $xml.Bundle.Identity.Version
                } elseif ($xml.Package -and $xml.Package.Properties -and $xml.Package.Properties.'Identity') {
                  $versionInfo = $xml.Package.Properties.Identity.Version
                }

                if (-not $versionInfo) {
                  Write-Warning "在清单中未找到版本信息，使用 'latest' 作为版本"
                  $versionInfo = "latest"
                }
              }
            }

            Write-Host "版本: $versionInfo"
            echo "VERSION=$versionInfo" >> $env:GITHUB_ENV
          } finally {
            Remove-Item -Path $tempDir -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude Desktop MSIX"
          tag_name: "msix-${{ github.run_number }}"
          body: |
            ## Claude Desktop Windows MSIX 安装包

            - **Run**: ${{ github.run_number }}
            - **日期**: ${{ github.event.repository.updated_at }}

            ### 安装方法
            以管理员身份打开 PowerShell：
            ```powershell
            Add-AppxPackage -Path "Claude.msix"
            ```
          files: Claude.msix